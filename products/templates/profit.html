<h2>All Profits</h2>
{% for profit in profits %}
    <p>Customer: {{ profit.order.customer.name }}</p>
    <p>Total Profit: {{ profit.profit_amount }}</p>
{% endfor %}

<h3>Profit This Week</h3>
<p>Total Profit This Week: {{ weekly_profits }}</p>

<h4>Profit This Month</h4>
<p>Total Profit This Month: {{ monthly_profits }}</p>
